<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="icon" type="image/png" href="assets/github-logo.png">
     <script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    .btn-gradient {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      transition: opacity .2s;
    }
    .btn-gradient:hover { opacity: .9; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10" style="background-color: #f0f2f5;">
  <div class="w-full max-w-5xl mx-auto px-6 sm:px-12 lg:px-20">
    <div class="bg-white w-full max-w-md mx-auto rounded-2xl shadow-sm p-8 sm:p-10">
<div class="text-center mb-7">
        <img src="assets/github-logo.png"alt="GitHub Logo"class="w-16 h-16 mx-auto mb-4"/>
<h1 class="text-2xl font-bold text-gray-900">GitHub Issues Tracker</h1>
        <p class="text-gray-400 text-sm mt-1">Sign in to manage your issues</p>
      </div>
<div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-1">Username</label>
          <input id="username"type="text"placeholder="Enter Username"class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"/>
          <p class="text-xs text-violet-600 mt-1">Default: admin</p>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-1">Password</label>
          <input id="password"type="password"placeholder="Enter Password"class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"/>
          <p class="text-xs text-violet-600 mt-1">Default: admin123</p>
        </div>
        <p id="loginError" class="hidden text-red-500 text-sm text-center font-medium">
          Invalid credentials. Please try again.
        </p>
        <button id="loginBtn"class="btn-gradient w-full py-3 text-white font-semibold rounded-lg text-sm mt-1">
          Sign In
        </button>
      </div>
     <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400 font-medium">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>
</body>
</html>
